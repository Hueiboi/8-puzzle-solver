<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N-Puzzle A* AI Solver</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- Bọc các phần tử cần làm mờ vào div này -->
<div class="blur-target" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
    <h1>N-Puzzle AI Solver</h1>

    <div class="glass-panel">
        <div class="input-group">
            <div class="field">
                <label>Loại Puzzle:</label>
                <select id="puzzleType" onchange="changeType()">
                    <option value="8">8-Puzzle (3x3)</option>
                    <option value="15">15-Puzzle (4x4)</option>
                </select>
            </div>
            <div class="field">
                <label>Trạng thái ban đầu:</label>
                <input type="text" id="inputInitial" size="30">
            </div>
            <div class="field">
                <label>Đích đến:</label>
                <input type="text" id="inputGoal" size="30">
            </div>
        </div>

        <div class="grid" id="board"></div>

        <div id="status">Trạng thái: Sẵn sàng</div>

        <div class="button-group">
            <button id="shuffleBtn" onclick="shuffleBoard()">Xáo trộn</button>
            <button id="solveBtn" onclick="solvePuzzle()">Bắt đầu giải</button>
            <button id="resetBtn" onclick="resetPuzzle()">Reset bảng</button>
        </div>
    </div>
</div>

<!-- CẤU TRÚC MODAL -->
<div id="modalOverlay">
    <div class="modal-card">
        <h2>🎉 Giải thành công!</h2>
        <div class="stat-row">Tổng số bước: <b id="resSteps">0</b></div>
        <div class="stat-row">Thời gian tính toán: <b id="resTime">0</b> ms</div>
        <button class="btn-close" onclick="closeModal()">Tuyệt vời</button>
    </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
